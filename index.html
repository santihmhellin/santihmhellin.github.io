<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Santiago Hortelano</title>
    <style>
        /* Estilos generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117; /* Fondo oscuro tipo GitHub */
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Contenedor principal */
        .card {
            background-color: #161b22;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 400px;
            text-align: center;
        }

        h1 { color: #58a6ff; margin-bottom: 0.5rem; }
        h2 { color: #8b949e; font-size: 1.2rem; margin-top: 0; }
        
        .info { text-align: left; margin: 1.5rem 0; }
        .info p { margin: 0.8rem 0; line-height: 1.5; }
        
        strong { color: #f0f6fc; }

        /* Botón de GitHub */
        .btn {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>GitHub</h1>
        <h2>Santiago Hortelano</h2>
        
        <div class="info">
            <p><strong>Sobre mí:</strong> Me llamo Santiago y me apasiona la programación.</p>
            <p><strong>Formación:</strong> Bachillerato de CCSS y ASIR.</p>
            <p><strong>Proyectos:</strong> Psicochat 🚀</p>
            <p><strong>Contacto:</strong> santihmhellin@gmail.com</p>
        </div>
        
        <a href="https://github.com/santihmhellin/santihmhellin.github.io" class="btn" target="_blank">
            Ver Perfil Completo
        </a>
    </div>

</body>
</html>
